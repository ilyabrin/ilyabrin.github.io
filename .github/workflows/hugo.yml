name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.0
      DART_SASS_VERSION: 1.89.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache Hugo binary
        id: cache-hugo
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/hugo
          key: hugo-${{ env.HUGO_VERSION }}-linux-amd64

      - name: Install Hugo CLI
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Cache Dart Sass binary
        id: cache-sass
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/sass
          key: dart-sass-${{ env.DART_SASS_VERSION }}-linux-x64

      - name: Install Dart Sass
        if: steps.cache-sass.outputs.cache-hit != 'true'
        run: |
          wget -O ${{ runner.temp }}/dart-sass.tar.gz \
            https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz \
          && tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }} \
          && sudo mv ${{ runner.temp }}/dart-sass/sass /usr/local/bin/sass \
          && sudo chmod +x /usr/local/bin/sass

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources/_gen
          key: hugo-resources-${{ hashFiles('content/**', 'assets/**', 'layouts/**', 'config.*', 'hugo.*') }}
          restore-keys: |
            hugo-resources-

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
