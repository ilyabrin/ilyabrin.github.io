<link rel="stylesheet" href="/custom-improvements.css">

<!-- Dark theme: apply before render to prevent flash -->
<script>
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<style>
  /* ── Reading progress bar ── */
  #reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: #5c8b59;
    z-index: 10000;
    transition: width 0.1s linear;
    pointer-events: none;
  }
  #reading-progress::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 60px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.4));
  }

  /* ── Dark theme toggle button ── */
  #theme-toggle {
    position: absolute;
    right: 0;
    bottom: 2.6em;
    padding: 0.5em 1em;
    border: none;
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
    background-color: #2D3642;
    color: #f1f1f1;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5em;
    opacity: 0.75;
    transition: opacity 0.2s ease, background-color 0.2s ease;
    font-family: inherit;
    white-space: nowrap;
  }
  #theme-toggle:hover {
    opacity: 1;
  }
  #theme-toggle .fa-sun  { display: none; }
  #theme-toggle .fa-moon { display: block; }
  #theme-toggle .toggle-label { font-size: 1em; }

  html[data-theme="dark"] #theme-toggle {
    background-color: #2D3642;
    opacity: 0.75;
  }
  html[data-theme="dark"] #theme-toggle:hover {
    opacity: 1;
  }
  html[data-theme="dark"] #theme-toggle .fa-sun  { display: block; }
  html[data-theme="dark"] #theme-toggle .fa-moon { display: none; }

  /* ── Dark theme overrides ── */
  html[data-theme="dark"] body {
    background-color: #12131f;
    color: #ddd;
  }

  html[data-theme="dark"] header {
    background-color: #0d0e1a;
  }

  html[data-theme="dark"] nav,
  html[data-theme="dark"] header .toggler,
  html[data-theme="dark"] header .languages {
    background-color: #1e2030;
  }

  html[data-theme="dark"] nav ul.topnav a {
    color: #ccc;
  }
  html[data-theme="dark"] nav ul.topnav a:hover {
    color: #fff;
  }

  html[data-theme="dark"] article {
    background-color: #1e1f35;
    color: #ddd;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  html[data-theme="dark"] article:before {
    border-right-color: #3a3b55;
  }
  html[data-theme="dark"] article:after {
    border-right-color: #1e1f35;
  }

  html[data-theme="dark"] article .content h1 a,
  html[data-theme="dark"] article .content h2,
  html[data-theme="dark"] article .content h3,
  html[data-theme="dark"] article .content h4,
  html[data-theme="dark"] article .content h5,
  html[data-theme="dark"] article .content h6 {
    color: #e8e8e8;
  }

  html[data-theme="dark"] article .content .meta {
    color: #888;
    border-bottom-color: #2e2f4a;
  }

  html[data-theme="dark"] article .content blockquote {
    background-color: #161727;
    border-left-color: #2e2f4a;
    color: #ccc;
  }

  html[data-theme="dark"] article .content .archive-list ul li {
    border-bottom-color: #2e2f4a;
  }

  html[data-theme="dark"] article .footer {
    background-color: rgba(0, 0, 0, 0.25);
  }

  html[data-theme="dark"] .main:after {
    background: #2e2f4a;
  }

  html[data-theme="dark"] .main:before {
    background: rgba(255,255,255,0.04);
  }

  html[data-theme="dark"] .main .article-wrapper .bubble {
    background-color: #3a3b55;
    border-color: #2a2b45;
    color: #ddd;
  }

  html[data-theme="dark"] footer {
    background-color: rgba(30, 31, 53, 0.95);
    border-top-color: #2e2f4a;
    border-bottom-color: #2e2f4a;
    color: #bbb;
  }

  html[data-theme="dark"] footer ul li {
    border-bottom-color: #2e2f4a;
  }

  html[data-theme="dark"] footer .container strong {
    color: #ccc;
  }

  html[data-theme="dark"] footer .right .external-profiles a {
    color: #aaa;
  }
  html[data-theme="dark"] footer .right .external-profiles a:hover {
    color: #5c8b59;
  }

  html[data-theme="dark"] footer ul a {
    color: #5c8b59 !important;
  }
  html[data-theme="dark"] footer ul a:hover {
    color: #e0e0e0 !important;
  }

  html[data-theme="dark"] footer .right .languages a {
    color: #5c8b59 !important;
  }
  html[data-theme="dark"] footer .right .languages a:hover {
    color: #e0e0e0 !important;
  }

  html[data-theme="dark"] .credits .container a:hover {
    color: #aaa !important;
  }

  html[data-theme="dark"] .credits {
    background-color: #0d0e1a;
    color: #666;
  }

  html[data-theme="dark"] .credits .container a {
    color: #777;
  }

  /* Code blocks */
  html[data-theme="dark"] pre {
    background-color: #0f1021 !important;
  }

  html[data-theme="dark"] code:not([class]) {
    background-color: #1a1b30;
    color: #e0c97f;
    padding: 0.1em 0.35em;
    border-radius: 3px;
  }

  /* Search */
  html[data-theme="dark"] #search {
    background-color: #1e2030;
    color: #ddd;
    border-color: #3a3b55;
  }
</style>
