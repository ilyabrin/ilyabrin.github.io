<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js')
        .catch(function(err) { console.warn('[SW] Registration failed:', err); });
    });
  }
</script>

<!-- Reading progress bar -->
<div id="reading-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

<script>
  (function() {
    var bar = document.getElementById('reading-progress');
    if (!bar) return;

    // Only show on single article pages
    var article = document.querySelector('article.article, article.single, .main article');
    if (!article) {
      bar.style.display = 'none';
      return;
    }

    function updateProgress() {
      var articleTop = article.getBoundingClientRect().top + window.scrollY;
      var articleBottom = articleTop + article.offsetHeight;
      var windowBottom = window.scrollY + window.innerHeight;
      var total = articleBottom - articleTop - window.innerHeight;
      var progress = total > 0 ? Math.min(100, Math.max(0, (window.scrollY - articleTop) / total * 100)) : 0;

      bar.style.width = progress + '%';
      bar.setAttribute('aria-valuenow', Math.round(progress));
    }

    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();
  })();

  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;

    var label = btn.querySelector('.toggle-label');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        if (label) label.textContent = label.dataset.dark || 'Light';
      } else {
        document.documentElement.removeAttribute('data-theme');
        if (label) label.textContent = label.dataset.light || 'Dark';
      }
    }

    // Sync label with current state on load
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'dark' : 'light');

    btn.addEventListener('click', function() {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });
  })();
</script>
